<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Formula E — Race Control</title>
<style>
  :root{
    --bg:#0b0f14; --panel:#131a22; --panel2:#0f151c; --edge:#243040;
    --ink:#e7edf3; --dim:#8aa0b4; --tele:#4aa3ff; --video:#c07cff;
    --yellow:#ffd23f; --dbl:#ff9e2c; --sc:#ff4d4d; --green:#39d98a;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);height:100vh;overflow:hidden;
       display:flex;flex-direction:column;
       font:14px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
  header,#banner,.bar{flex:0 0 auto}
  header{display:flex;align-items:center;gap:16px;padding:10px 16px;
         background:var(--panel2);border-bottom:1px solid var(--edge)}
  header h1{font-size:16px;margin:0;letter-spacing:.5px;font-weight:700}
  header .dot{width:9px;height:9px;border-radius:50%;background:#555;display:inline-block;margin-right:6px}
  header .dot.live{background:var(--green);box-shadow:0 0 8px var(--green)}
  #pauseTag{display:none;font-size:12px;font-weight:800;letter-spacing:1px;
            padding:3px 10px;border-radius:12px;background:var(--sc);color:#2a0000}
  #pauseTag.on{display:inline-block}
  /* track-condition pill — reflects the flag the official has deployed */
  #cond{font-size:12px;font-weight:800;letter-spacing:.5px;padding:3px 11px;border-radius:12px;
        border:1px solid var(--edge);color:var(--green)}
  #cond.GREEN{background:var(--green);color:#0c2a18;border-color:transparent}
  #cond.DOUBLE_YELLOW{background:var(--dbl);color:#221800;border-color:transparent}
  #cond.SAFETY_CAR{background:var(--sc);color:#2a0000;border-color:transparent}
  .clock{margin-left:auto;font-variant-numeric:tabular-nums;color:var(--dim)}
  .clock b{color:var(--ink);font-size:16px}
  #banner{padding:6px 16px;font-weight:700;text-align:center;display:none}

  /* left half = the two worker agents (side by side, full height); right half = Race Control */
  .wrap{flex:1 1 auto;min-height:0;display:grid;
        grid-template-columns:1fr 1fr;gap:10px;padding:10px}
  .agents{min-height:0;display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .col{background:var(--panel);border:1px solid var(--edge);border-radius:10px;
       display:flex;flex-direction:column;min-height:0}
  .col h2{margin:0;padding:9px 12px;font-size:12px;letter-spacing:1px;text-transform:uppercase;
          border-bottom:1px solid var(--edge);color:var(--dim)}
  .col.tele h2{color:var(--tele)} .col.video h2{color:var(--video)}
  .col.recs h2{color:var(--ink);font-size:13px}
  .col h2{display:flex;align-items:center;gap:8px}
  /* per-agent online indicator in each feed header */
  .stat{margin-left:auto;font-size:10px;font-weight:700;letter-spacing:.5px;
        text-transform:none;color:#6b7a89}
  .stat.on{color:var(--green)} .stat.warming{color:var(--dbl)} .stat.off{color:#6b7a89}
  /* Race Control is the decision surface — give its cards a bit more presence */
  .col.recs .feed{gap:9px;padding:11px}
  .feed{overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:6px}
  .item{background:var(--panel2);border:1px solid var(--edge);border-left:3px solid var(--edge);
        border-radius:6px;padding:6px 9px;font-size:12.5px}
  .item .meta{color:var(--dim);font-size:11px;display:flex;gap:8px;margin-bottom:2px}
  .col.tele .item{border-left-color:var(--tele)} .col.video .item{border-left-color:var(--video)}
  /* recommendation cards */
  .rec{background:var(--panel2);border:1px solid var(--edge);border-radius:8px;padding:10px;
       border-left:5px solid var(--edge);transition:opacity .28s ease,transform .28s ease}
  .rec.gone{opacity:0;transform:translateY(-8px)}
  .rec.DOUBLE_YELLOW{border-left-color:var(--dbl)} .rec.SAFETY_CAR{border-left-color:var(--sc)}
  .rec.YELLOW{border-left-color:var(--yellow)}
  .rec.cleared{border-left-color:var(--green);opacity:.92}
  .rec .top{display:flex;align-items:center;gap:8px;margin-bottom:5px}
  .flag{font-weight:800;letter-spacing:.5px;padding:2px 8px;border-radius:5px;font-size:12px}
  .flag.DOUBLE_YELLOW{background:var(--dbl);color:#221800}
  .flag.SAFETY_CAR{background:var(--sc);color:#2a0000}
  .flag.YELLOW{background:var(--yellow);color:#221d00}
  .flag.CLEARED{background:var(--green);color:#0c2a18}
  .kind{font-size:10px;letter-spacing:1px;color:var(--dim);border:1px solid var(--edge);
        padding:1px 6px;border-radius:10px}
  .kind.ESCALATION{color:var(--sc);border-color:var(--sc)}
  .kind.CONFIRMED{color:var(--green);border-color:var(--green)}
  .kind.CLEARED{color:var(--green);border-color:var(--green)}
  .upd{font-size:10px;letter-spacing:.5px;color:var(--dbl);border:1px solid var(--dbl);
       padding:1px 6px;border-radius:10px;text-transform:uppercase}
  .rec.superseded{opacity:.5}
  .rec.superseded .narr{display:none}          /* keep superseded beats compact */
  .rec.isupdate{border-left-style:dashed}
  .corr{margin-left:auto;font-size:11px;color:var(--green);font-weight:700}
  .rec .narr{color:#c7d4e0;font-size:12.5px;margin:5px 0 8px}
  .btns{display:flex;gap:8px}
  .btn{flex:1;padding:7px;border-radius:6px;border:1px solid var(--edge);cursor:pointer;
       font-weight:700;background:#1b2530;color:var(--ink)}
  .btn.ok{background:#16351f;border-color:#1f6b3a;color:var(--green)}
  .btn.no{background:#331717;border-color:#6b1f1f;color:#ff9a9a}
  .rec.approved{opacity:.75} .rec.approved .btns{display:none}
  .decided{font-weight:700;font-size:12px;margin-top:4px}
  /* controls */
  .bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:10px 16px;
       background:var(--panel2);border-top:1px solid var(--edge)}
  .bar .grp{display:flex;gap:6px;align-items:center}
  .bar .lbl{color:var(--dim);font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-right:2px}
  .cbtn{padding:6px 11px;border-radius:6px;border:1px solid var(--edge);background:#1b2530;
        color:var(--ink);cursor:pointer;font-size:12.5px;font-weight:600}
  .cbtn:hover{border-color:#3a536b}
  .cbtn.jump{background:#17222e}
  .cbtn.active{background:#26527d;border-color:var(--tele);color:#fff;box-shadow:0 0 0 1px var(--tele) inset}
  .cbtn.jump.active{background:#7a3b12;border-color:var(--dbl);color:#fff;box-shadow:0 0 0 1px var(--dbl) inset}
  .cbtn.paused{background:#5a2020;border-color:var(--sc);color:#ffd7d7;
               box-shadow:0 0 0 1px var(--sc) inset}
  .sep{width:1px;height:22px;background:var(--edge);margin:0 4px}
</style>
</head>
<body>
<header>
  <span id="live" class="dot"></span><h1>FORMULA E · RACE CONTROL</h1>
  <span id="cond" class="GREEN">● GREEN</span>
  <span id="pauseTag">⏸ PAUSED</span>
  <span class="clock">RACE <b id="clock">—</b></span>
</header>
<div id="banner"></div>

<div class="wrap">
  <div class="agents">
    <div class="col tele"><h2>▸ Telemetry Agent <span class="stat off" id="st-telemetry">● offline</span></h2><div class="feed" id="teleFeed"></div></div>
    <div class="col video"><h2>▸ Video Agent <span class="stat off" id="st-video">● offline</span></h2><div class="feed" id="videoFeed"></div></div>
  </div>
  <div class="col recs"><h2>◆ Race Control — Recommendations <span class="stat off" id="st-correlator">● offline</span></h2><div class="feed" id="recs"></div></div>
</div>

<div class="bar">
  <span class="lbl">Jump to</span><span class="grp" id="jumpBtns"></span>
  <span class="sep"></span>
  <span class="grp">
    <button class="cbtn" id="btnToggle" onclick="togglePlay()">⏸ Pause</button>
    <button class="cbtn" id="btnClear" onclick="clearBoard()">⌫ Clear</button>
    <button class="cbtn" onclick="restart()">⟲ Restart</button>
  </span>
</div>

<script>
const GREEN_FLAG = Date.UTC(2024,4,12,13,4,0)/1000;   // race_time_s = 0
const recEls={};
const jumpEls=[];          // jump buttons, in chronological order
let activeJump=null;       // currently-selected jump button
let pendingPauseAt=null;   // race-second to auto-pause at (end of the jumped window)

function fmtClock(s){if(s==null)return '—';const d=new Date((GREEN_FLAG+s)*1000);
  return d.toISOString().substr(11,8);}

// Load the jump points (from the track geometry file) and build the jump buttons.
async function initJumps(){
  const geom=await (await fetch('/static/track_geometry.json')).json();
  const jb=document.getElementById('jumpBtns');
  const incs=[...geom.incidents].sort((a,b)=>a.race_time_s-b.race_time_s);
  incs.forEach(i=>{const b=document.createElement('button');
    b.className='cbtn jump';b.textContent=i.label;b.title=i.note||'';
    b.onclick=()=>jump(i.race_time_s,b,i.pause_s);jb.appendChild(b);jumpEls.push(b);});
}

// ---- feeds ----
function addFeed(id,cls,meta,body,ts){
  const f=document.getElementById(id);
  const d=document.createElement('div');d.className='item';d.dataset.ts=ts||'';
  d.innerHTML=`<div class="meta">${meta}</div>${body}`;
  // log-tail: keep chronological order and land the newest at the BOTTOM — insert
  // before the first item with a LATER timestamp (guards near-simultaneous arrivals)
  const atBottom=f.scrollHeight-f.scrollTop-f.clientHeight<40;
  let ref=null;
  for(const ch of f.children){ if((ch.dataset.ts||'')>d.dataset.ts){ref=ch;break;} }
  f.insertBefore(d,ref);
  while(f.children.length>60)f.firstChild.remove();      // trim the oldest (top)
  if(atBottom)f.scrollTop=f.scrollHeight;                // follow the latest
}
function onObservation(o){
  const t=o.ts_utc.substr(11,8);
  if(o.modality==='telemetry'){
    addFeed('teleFeed','tele',`${t} · car ${o.car_number??'?'} · sev ${o.severity}`,
      `${o.signal.replace(/_/g,' ')} — ${o.summary}`,o.ts_utc);
  }else{
    addFeed('videoFeed','video',`${t} · ${o.camera_id||'cam'} · sev ${o.severity}`,o.summary,o.ts_utc);
  }
}

// ---- incidents / recommendations (a STACK of beats) ----
// recEls[id] = the LATEST card for an incident. Each correlator beat
// (NEW/ESCALATION/CONFIRMED/CLEARED) is pushed as a NEW card on top; the prior
// one is dimmed (superseded) so the whole progression stays visible.
function supersede(card){
  if(!card) return;
  card.classList.add('superseded');
  const b=card.querySelector('.btns'); if(b) b.remove();      // no longer actionable
}
function pushBeat(p){
  const r=p.report, inc=r.incident, id=inc.incident_id, flag=r.recommendation.flag;
  const cars=(inc.car_numbers||[]).map(c=>'#'+c).join(' ');
  const kind=p.kind||'NEW';
  const corr=inc.corroborated||inc.video_verdict==='blocked';
  const prev=recEls[id], prevFlag=prev?prev.dataset.flag:null;
  if(prev) supersede(prev);                                   // dim the earlier beat
  const upd = prev ? `<span class="upd">↻ update${prevFlag&&prevFlag!=='NONE'?' · was '+prevFlag.replace(/_/g,' '):''}</span>` : '';
  const card=document.createElement('div');
  card.dataset.flag=flag; card.dataset.cars=cars||'incident';

  if(kind==='CLEARED'){
    card.className='rec cleared'+(prev?' isupdate':'');
    card.innerHTML=
      `<div class="top"><span class="flag CLEARED">CLEARED</span>`+
      `<span class="kind CLEARED">VIDEO VETO</span>${upd}</div>`+
      `<div><b>${cars||'incident'}</b> — stood down, no flag</div>`+
      `<div class="narr">${r.narrative}</div>`;
  }else{
    const dec = inc.approved===true?true : inc.approved===false?false : undefined;
    const tail = dec===true
        ? `<div class="decided" style="color:var(--green)">✓ APPROVED — ${flag.replace(/_/g,' ')} deployed</div>`
      : dec===false
        ? `<div class="decided" style="color:#ff9a9a">✕ rejected — no flag deployed</div>`
      : (flag!=='NONE'
        ? `<div class="btns"><button class="btn ok" onclick="decide('${id}','approve')">Approve — deploy ${flag.replace(/_/g,' ')}</button>`+
          `<button class="btn no" onclick="decide('${id}','reject')">Reject</button></div>`
        : '');
    card.className='rec '+flag+(prev?' isupdate':'')+(dec!==undefined?' approved':'');
    card.innerHTML=
      `<div class="top"><span class="flag ${flag}">${flag.replace(/_/g,' ')}</span>`+
      `<span class="kind ${kind}">${kind}</span>${upd}`+
      (corr?`<span class="corr">✓ corroborated by video</span>`:``)+
      `</div><div><b>${cars||'incident'}</b> — ${r.headline.replace(/^\[.*?\]\s*/,'')}</div>`+
      `<div class="narr">${r.narrative}</div>`+tail;
  }
  const recs=document.getElementById('recs');
  recs.appendChild(card);                  // newest at the BOTTOM (matches the sensor feeds)
  recs.scrollTop=recs.scrollHeight;        // follow the latest beat
  recEls[id]=card;
}

function onIncident(p){
  const r=p.report, inc=r.incident, id=inc.incident_id, flag=r.recommendation.flag;
  const cars=(inc.car_numbers||[]).map(c=>'#'+c).join(' ');
  const kind=p.kind||'NEW';
  if(flag==='NONE' && kind!=='CLEARED') return;   // note-and-monitor: off the decision surface
  pushBeat(p);
  if(kind==='SNAPSHOT') return;                    // don't banner stale Firestore replays
  const ban=document.getElementById('banner');
  if(kind==='CLEARED'){
    ban.style.display='block'; ban.style.background='#16351f'; ban.style.color='#c9f5d9';
    ban.textContent=`STOOD DOWN: ${cars} — video verification cleared it, no flag`;
  }else{
    ban.style.display='block'; ban.style.background=flag==='SAFETY_CAR'?'var(--sc)':'var(--dbl)'; ban.style.color='#160000';
    ban.textContent=`${kind}: ${cars} — RECOMMEND ${flag.replace(/_/g,' ')}`+((inc.corroborated||inc.video_verdict==='blocked')?' · CORROBORATED':'');
  }
}

// ---- agent online indicators ----
function setStat(elId, s){
  const e=document.getElementById(elId); if(!e) return;
  if(!s || !s.online){ e.className='stat off'; e.textContent='● offline'; return; }
  if(s.state==='warming'){ e.className='stat warming'; e.textContent='● warming '+(s.detail||''); return; }
  if(s.state==='ready'){ e.className='stat on'; e.textContent='● ready'; return; }
  e.className='stat on'; e.textContent='● online';
}
function onAgents(a){
  a=a||{};
  setStat('st-telemetry', a.telemetry);
  setStat('st-video', a.video);
  setStat('st-correlator', a.correlator);
}

// ---- race clock ----
function onCars(m){
  document.getElementById('clock').textContent=fmtClock(m.race_time_s);
  // auto-pause once the race clock reaches the end of the jumped incident window
  if(pendingPauseAt!=null && m.race_time_s!=null && m.race_time_s>=pendingPauseAt){
    pendingPauseAt=null; autoPause();
  }
}

// ---- controls ----
async function ctl(p){await fetch('/control/'+p,{method:'POST'});pollStatus();}
async function jump(t,btn,pauseAt){
  resetBoard();                          // fresh slate (also clears any stale jump highlight)
  if(btn){btn.classList.add('active');activeJump=btn;}        // highlight THIS incident
  pendingPauseAt=(pauseAt!=null && pauseAt>t)?pauseAt:null;   // auto-pause at window end
  await fetch('/control/jump',{method:'POST',
    headers:{'content-type':'application/json'},body:JSON.stringify({race_time_s:t})});
  applyStatus({paused:false});           // jump auto-plays from here — reflect it right away
  pollStatus();
}
async function autoPause(){
  await fetch('/control/pause',{method:'POST'});   // reached the end of the incident window
  if(activeJump){activeJump.classList.remove('active');activeJump=null;}  // incident done → drop highlight
  const ban=document.getElementById('banner');     // clear "window complete" indicator
  ban.style.display='block'; ban.style.background='#1b2a3a'; ban.style.color='#cfe0f0';
  ban.textContent='⏸ Incident window complete — simulator paused. Press ▶ Resume to continue.';
  pollStatus();
}
async function decide(id,d){
  applyDecision(id, d==='approve');                       // instant, optimistic feedback
  try{await fetch(`/incident/${id}/${d}`,{method:'POST'});}catch(e){}
}
// Mark the latest beat decided in place (stays in the stack as history) and, on
// approval, put the flag "out" — set the track-condition pill.
function applyDecision(id,approved){
  const card=recEls[id];
  if(!card || card.querySelector('.decided')) return;    // idempotent (WS echo)
  const flag=card.dataset.flag, cars=card.dataset.cars;
  const b=card.querySelector('.btns'); if(b) b.remove();
  card.classList.add('approved');
  const n=document.createElement('div'); n.className='decided';
  if(approved){ n.style.color='var(--green)'; n.textContent=`✓ APPROVED — ${flag.replace(/_/g,' ')} deployed`; setCondition(flag,cars); }
  else { n.style.color='#ff9a9a'; n.textContent='✕ rejected — no flag deployed'; }
  card.appendChild(n);
}
// Reset the visible board for a fresh scenario (does not touch the sim).
function resetBoard(){
  pendingPauseAt=null;                                    // cancel any armed auto-pause
  document.getElementById('recs').innerHTML='';          // clear the recommendation stack
  for(const k in recEls) delete recEls[k];
  document.getElementById('teleFeed').innerHTML='';      // clear the sensor feeds too
  document.getElementById('videoFeed').innerHTML='';
  document.getElementById('banner').style.display='none';
  const cond=document.getElementById('cond'); cond.className='GREEN'; cond.textContent='● GREEN';
  jumpEls.forEach(b=>b.classList.remove('active')); activeJump=null;   // clear stale jump highlight
}
async function clearBoard(){ resetBoard(); try{await fetch('/incidents/clear',{method:'POST'});}catch(e){} }
async function restart(){ resetBoard(); try{await fetch('/incidents/clear',{method:'POST'});}catch(e){} await ctl('restart'); }
function setCondition(flag,cars){
  const c=document.getElementById('cond');
  c.className=flag; c.textContent='● '+flag.replace(/_/g,' ');
  const ban=document.getElementById('banner');
  ban.style.display='block';
  ban.style.background=flag==='SAFETY_CAR'?'var(--sc)':'var(--dbl)'; ban.style.color='#160000';
  ban.textContent=`${flag.replace(/_/g,' ')} DEPLOYED — ${cars}`;
}

// ---- sim status → reflect pause/speed state on the controls ----
let simPaused=false;
function applyStatus(s){
  simPaused=!!s.paused;
  document.getElementById('pauseTag').classList.toggle('on',simPaused);
  const t=document.getElementById('btnToggle');           // one toggle: Pause ⇄ Resume
  t.textContent=simPaused?'▶ Resume':'⏸ Pause';
  t.classList.toggle('paused',simPaused);
}
async function togglePlay(){ await ctl(simPaused?'resume':'pause'); }
async function pollStatus(){
  try{const s=await (await fetch('/control/status')).json();applyStatus(s);}catch(e){}
}

// ---- websocket ----
function connect(){
  const ws=new WebSocket((location.protocol==='https:'?'wss://':'ws://')+location.host+'/ws');
  ws.onopen=()=>document.getElementById('live').classList.add('live');
  ws.onclose=()=>{document.getElementById('live').classList.remove('live');setTimeout(connect,2000);};
  ws.onmessage=e=>{const m=JSON.parse(e.data);
    if(m.type==='observation')onObservation(m.data);
    else if(m.type==='incident')onIncident(m.data);
    else if(m.type==='cars')onCars(m);
    else if(m.type==='decision'){applyDecision(m.incident_id, m.approved);}
    else if(m.type==='cleared'){resetBoard();}
    else if(m.type==='agents'){onAgents(m.agents);}
  };
  setInterval(()=>{try{ws.send('ping')}catch(e){}},15000);
}
initJumps().then(connect);
pollStatus(); setInterval(pollStatus,2000);
</script>
</body>
</html>
